name: Build

on:
  push:
    branches: [develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - run: dotnet build RiotUnlocker/RiotUnlocker.csproj -c Release --nologo
